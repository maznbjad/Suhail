<rect class="fill" x="345" y="150" width="70" height="150" rx="12"/><text class="label" x="380" y="135" text-anchor="middle">١٥</text><text class="small" x="380" y="334" text-anchor="middle">ج</text>
<rect class="fill" x="465" y="90" width="70" height="210" rx="12"/><text class="label" x="500" y="75" text-anchor="middle">٢١</text><text class="small" x="500" y="334" text-anchor="middle">د</text>
</svg>